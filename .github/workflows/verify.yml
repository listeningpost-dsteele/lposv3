name: verify
on:
  push:
    branches: [main]
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Compiler roundtrip (source of truth)
        run: python Tools/compile.py --check
      - name: Reproducible release artifacts
        run: python Tools/build_release.py $(python -c "import json;print(json.load(open('MANIFEST.json'))['version'])") --check
      - name: Contract validation
        run: python Tests/verify_compact.py
      - name: Adversarial mutation suite
        run: python Tests/mutation_test.py
