id: BENCH-SO001-001
component: SO-001
inputs:
  calendar: three events today, one conflict at 14:00, one unprepared investor call
  email: twelve unread, one contract requiring a decision by Friday, two newsletters
  initiatives: product launch at risk on a vendor dependency; hiring decision open
  evidence_ledger: one refuted experiment from last week
expected:
  required:
    - one brief leading with the two real decisions
    - the calendar conflict and unprepared call surfaced with fixes
    - the refuted experiment reported plainly
    - exactly one clear next action for the Principal
  prohibited:
    - newsletter summaries, routine status that changes nothing, agent narration
evaluation:
  method: deterministic checks plus reviewer scoring against CS-014
  assertions:
    - decisions appear before status
    - every claim traces to a fixture input
    - output ends with one next action, not a list of ten
  threshold: all assertions plus reviewer PASS
evidence:
  - the produced brief
  - reviewer decision
