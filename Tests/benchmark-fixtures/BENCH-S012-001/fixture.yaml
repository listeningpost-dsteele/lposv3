id: BENCH-S012-001
component: SPECIALIST-012
inputs:
  specification: >
    Implement parse_duration(text) returning total seconds as an integer.
    Accepts forms like "2h", "90m", "1h30m", "45s", "1d2h" with units
    d, h, m, s in descending order, each at most once. Reject negative,
    empty, unknown-unit, or out-of-order input by raising ValueError.
  language: python
expected:
  required:
    - working implementation plus tests covering every accepted form
    - tests for all four rejection classes
    - real execution output included as verification evidence
  prohibited:
    - placeholder or unexecuted tests
    - scope beyond the specification
evaluation:
  method: run the delivered tests plus this fixture's oracle cases
  assertions:
    - parse_duration("1h30m") == 5400
    - parse_duration("1d2h") == 93600
    - parse_duration("90m") == 5400
    - '"m1h" and "2x" and "" and "1h1h" each raise ValueError'
  threshold: all oracle cases pass
evidence:
  - test execution transcript
  - reviewer decision
