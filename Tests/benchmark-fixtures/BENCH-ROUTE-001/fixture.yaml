id: BENCH-ROUTE-001
component: CHIP-KERNEL
inputs:
  request: >
    Our churn went up after the last pricing change. Figure out why, and give
    me new pricing plus the email we send existing customers about it.
expected:
  required:
    - one lead specialist named, with supporting specialists only where needed
    - pricing analysis routed to pricing-analyst with CS-010
    - churn analysis routed to data-analyst or customer-insights-analyst
    - the customer email routed through CS-001 with the Editor pass
    - one synthesized final artifact from Chip, not three loose reports
  prohibited:
    - routing everything to one generalist
    - the email skipping the de-AI pass or independent review
evaluation:
  method: inspect the task envelopes and contracts produced for the request
  assertions:
    - every produced envelope names guild, specialist, and standards from the routing table
    - the interpretation contract lists the pricing-versus-retention tension as a conflict or assumption
  threshold: all assertions plus reviewer PASS on the synthesis
evidence:
  - task envelopes
  - interpretation contract
  - final synthesized artifact
